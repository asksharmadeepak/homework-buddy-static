<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify Forms</title>
  </head>
  <body>
    <!-- Static form for Netlify detection with Next.js static export -->
    <form name="beta-testers" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="beta-testers" />
      <input name="bot-field" />
      <input type="email" name="email" />
      <input type="checkbox" name="android" value="yes" />
    </form>
  </body>
</html>
