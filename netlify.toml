# Static Next.js export → publish the `out/` folder.
# Do NOT set Publish directory to `public` (no index.html there → 404).
#
# In Netlify UI → Site configuration → Build & deploy:
#   - Build command: npm run build  (or leave blank; this file wins)
#   - Publish directory: out
# Then: Deploys → Trigger deploy → Clear cache and deploy site

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXT_PUBLIC_GA_ID = "G-N7P5CLP7BW"
  # Cap parallelism if Netlify memory is tight on larger rebuilds
  NODE_OPTIONS = "--max-old-space-size=4096"
