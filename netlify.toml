# https://docs.netlify.com/frameworks/next-js/overview/
# https://answers.netlify.com/t/support-guide-i-ve-deployed-my-site-but-i-still-see-page-not-found/125
#
# Root cause of the current 404: Netlify is not serving the Next.js app
# (often Publish directory = "public", which has no index.html).
#
# In Netlify UI → Site configuration → Build & deploy → Continuous deployment:
#   - Build command: npm run build   (or leave blank; this file wins)
#   - Publish directory: CLEAR THIS FIELD (do not use "public" or "out")
# Then: Deploys → Trigger deploy → Clear cache and deploy site

[build]
  command = "npm run build"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "22"
  NEXT_TELEMETRY_DISABLED = "1"
